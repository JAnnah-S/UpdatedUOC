<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Create Event | FK Club Hub</title><link rel="stylesheet" href="../assets/css/style.css"><link rel="stylesheet" href="../assets/css/event.css"><link rel="stylesheet" href="../assets/css/responsive.css"></head>
<body class="app-shell" data-page="createEvent" data-role="committee" data-nav="events"><aside id="sidebar" class="sidebar"></aside><main class="main"><div id="topbar" class="topbar"></div><header class="page-header"><h1 id="eventFormTitle">Create Event</h1><p>Committee creates club events with semester and event type for reports.</p></header><section class="card" style="max-width:980px"><form id="eventForm" class="form"><input type="hidden" id="eventId"><div class="form-grid"><div class="form-group"><label>Club</label><select id="clubId"></select></div><div class="form-group"><label>Event Title</label><input id="title" required></div></div><div class="form-grid"><div class="form-group"><label>Date</label><input id="date" type="date" required></div><div class="form-group"><label>Time</label><input id="time" type="time" required></div></div><div class="form-grid"><div class="form-group"><label>Venue</label><input id="venue" required></div><div class="form-group"><label>Capacity</label><input id="capacity" type="number" min="1" required></div></div><div class="form-grid"><div class="form-group"><label>Semester</label><select id="semester"><option>2025/2026-1</option><option selected>2025/2026-2</option><option>2026/2027-1</option></select></div><div class="form-group"><label>Event Type</label><select id="eventType"><option>Workshop</option><option>Talk</option><option>Training</option><option>Competition</option><option>Forum</option><option>Community Service</option><option>General</option></select></div></div><div class="form-group"><label>Status</label><select id="status"><option>Open</option><option>Completed</option><option>Cancelled</option></select></div><div class="form-group"><label>Description</label><textarea id="description" required></textarea></div><div class="actions"><button class="btn btn-primary" type="submit">Save Event</button><a class="btn btn-light" href="eventList.html">Cancel</a></div></form></section></main><script src="../api/data.js.php"></script>
  <script src="../assets/js/app.js"></script><script src="../assets/js/sidebar.js"></script><script src="eventController.js"></script></body></html>
