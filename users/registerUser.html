<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Register User | FK Club Hub</title><link rel="stylesheet" href="../assets/css/style.css"><link rel="stylesheet" href="../assets/css/responsive.css"></head>
<body class="app-shell" data-page="registerUser" data-role="admin" data-nav="users"><aside id="sidebar" class="sidebar"></aside><main class="main"><div id="topbar" class="topbar"></div><header class="page-header"><h1 id="formTitle">First-Time User Registration</h1><p>Only administrator can create student, committee and staff accounts. Users cannot register themselves from login page.</p></header><section class="card" style="max-width:980px"><form id="registerUserForm" class="form"><input type="hidden" id="userId"><div class="form-grid"><div class="form-group"><label>Student/Staff ID</label><input id="studentId" required></div><div class="form-group"><label>Name</label><input id="name" required></div></div><div class="form-grid"><div class="form-group"><label>Email</label><input id="email" type="email" required></div><div class="form-group"><label>Phone</label><input id="phone"></div></div><div class="form-grid"><div class="form-group"><label>Role</label><select id="role"><option value="student">student</option><option value="committee">committee</option><option value="admin">admin</option></select></div><div class="form-group"><label>Temporary Password</label><input id="password" value="student123" required></div></div><div class="form-grid"><div class="form-group"><label>Department</label><input id="department"></div><div class="form-group"><label>Club</label><select id="clubId"></select></div></div><div class="form-group"><label>Committee Position</label><input id="position" placeholder="President / Secretary / Treasurer / Committee Member"></div><div class="actions"><button class="btn btn-primary" type="submit">Save User</button><a class="btn btn-light" href="manageUsers.html">Cancel</a></div></form></section></main><script src="../api/data.js.php"></script>
  <script src="../assets/js/app.js"></script><script src="../assets/js/sidebar.js"></script><script src="userController.js"></script></body></html>
